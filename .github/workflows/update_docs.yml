name: Update ST Docs
on:
  schedule:
    - cron: '0 * * * *' # (Runs every hour)
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  update-knowledge-base:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout Source Docs (SillyTavern-Docs)
        uses: actions/checkout@v6
        with:
          repository: SillyTavern/SillyTavern-Docs
          path: temp_source

      - name: Extract Upstream Commit Info
        id: upstream_info
        run: |
          cd temp_source
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "HASH=$SHORT_HASH" >> $GITHUB_OUTPUT

          # Random delimiter avoids output injection if the upstream commit message
          # ever happens to contain a line that matches a static delimiter like "EOF".
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "MSG<<$DELIM"
            # Using @ prevents collisions with both the forward slashes / and the regex alternation |
            # Wrapped in backticks so GitHub renders it as plain text instead of a live
            # cross-repo reference (which would otherwise ping the referenced PR/issue).
            git log -1 --pretty=%B | sed -E 's@(^|[^A-Za-z0-9_])#([0-9]+)@\1`SillyTavern/SillyTavern-Docs#\2`@g'
            echo "$DELIM"
          } >> $GITHUB_OUTPUT
          cd ..

      - name: Process Docs (Python Sanitization)
        run: |
          # 1. Prepare directories
          cp -r temp_source work_dir
          mkdir -p processed_temp

          echo "Running Python Sanitizer..."

          # 2. Run the Logic
          python3 scripts/sanitize_docs.py

          # Cleanup source
          rm -rf work_dir

      - name: Commit and Push Directly to Main
        id: push_to_main
        env:
          UPSTREAM_MSG: ${{ steps.upstream_info.outputs.MSG }}
          UPSTREAM_HASH: ${{ steps.upstream_info.outputs.HASH }}
        run: |
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'

          rm -rf docs temp_source
          mv processed_temp docs

          echo "Generating llms.txt, llms.md, and llms.json..."
          python3 scripts/generate_rag_bundle.py

          git add docs/ llms.txt llms.json llms.md

          if git diff --staged --quiet; then
            echo "No changes detected. Workflow finished."
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          else
            DATE=$(date +'%Y-%m-%d')
            TITLE_PREFIX="Auto-sync: Docs Update $DATE"
            COUNT=$(git log --oneline --grep="$TITLE_PREFIX" | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              COMMIT_TITLE="$TITLE_PREFIX"
            else
              NEXT=$((COUNT + 1))
              COMMIT_TITLE="$TITLE_PREFIX - Update $NEXT"
            fi

            git commit \
              -m "$COMMIT_TITLE" \
              -m "$UPSTREAM_MSG" \
              -m "Source Commit: \`https://github.com/SillyTavern/SillyTavern-Docs/commit/$UPSTREAM_HASH\`"

            # Retry with rebase in case main moved between checkout and push
            for attempt in 1 2 3; do
              if git push origin main; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Push failed after $attempt attempts."
                exit 1
              fi
              echo "Push rejected (attempt $attempt/3), rebasing onto latest main and retrying..."
              git fetch origin main
              git rebase origin/main
            done

            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          fi
