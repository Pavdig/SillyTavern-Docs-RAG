name: Update ST Docs
on:
  schedule:
    - cron: '0 * * * *' # (Runs every hour)
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  update-knowledge-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Checkout Source Docs (SillyTavern-Docs)
        uses: actions/checkout@v6
        with:
          repository: SillyTavern/SillyTavern-Docs
          path: temp_source

      - name: Extract Upstream Commit Info
        id: upstream_info
        run: |
          cd temp_source
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "HASH=$SHORT_HASH" >> $GITHUB_OUTPUT
          {
            echo 'MSG<<EOF'
            # This intercepts the log and prefixes bare issue numbers with the upstream repo identifier
            git log -1 --pretty=%B | sed -E 's|(^|[^A-Za-z0-9_])#([0-9]+)|\1SillyTavern/SillyTavern-Docs#\2|g'
            echo 'EOF'
          } >> $GITHUB_OUTPUT
          cd ..

      - name: Process Docs (Python Sanitization)
        run: |
          # 1. Prepare directories
          cp -r temp_source work_dir
          mkdir -p processed_temp

          echo "Running Python Sanitizer..."

          # 2. Run the Logic
          python3 scripts/sanitize_docs.py

          # Cleanup source
          rm -rf work_dir

      - name: Commit and Push Directly to Main
        id: push_to_main
        env:
          UPSTREAM_MSG: ${{ steps.upstream_info.outputs.MSG }}
          UPSTREAM_HASH: ${{ steps.upstream_info.outputs.HASH }}
        run: |
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'

          rm -rf docs temp_source
          mv processed_temp docs

          echo "Generating llms.txt, llms.md, and llms.json..."
          python3 scripts/generate_rag_bundle.py

          git add docs/ llms.txt llms.json llms.md

          if git diff --staged --quiet; then
            echo "No changes detected. Workflow finished."
            echo "HAS_CHANGES=false" >> $GITHUB_OUTPUT
          else
            DATE=$(date +'%Y-%m-%d')
            COUNT=$(git log --oneline --grep="Sync: Docs Update $DATE" | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              COMMIT_TITLE="Sync: Docs Update $DATE"
            else
              NEXT=$((COUNT + 1))
              COMMIT_TITLE="Sync: Docs Update $DATE - Update $NEXT"
            fi

            git commit \
              -m "$COMMIT_TITLE" \
              -m "$UPSTREAM_MSG" \
              -m "Source Commit: https://github.com/SillyTavern/SillyTavern-Docs/commit/$UPSTREAM_HASH"
            git push origin main
            echo "HAS_CHANGES=true" >> $GITHUB_OUTPUT
          fi
